version: '3.5'

services:
  jibri:
    image: jitsi/jibri:${JITSI_IMAGE_VERSION:-unstable}
    restart: ${RESTART_POLICY:-unless-stopped}

    # 🔥 MOST IMPORTANT FIX
    privileged: true

    shm_size: '2gb'

    # 🔥 AUDIO + CHROME SUPPORT
    devices:
      - /dev/snd:/dev/snd

    volumes:
      - ${CONFIG}/jibri:/config
      - /dev/shm:/dev/shm
      - /tmp:/tmp

    environment:
      # 🔥 REQUIRED FOR CHROME
      - DISPLAY=:0
      - CHROMIUM_FLAGS=--no-sandbox --disable-dev-shm-usage

      # 🔥 S3 FLOW TRIGGER
      - JIBRI_FINALIZE_RECORDING_SCRIPT_PATH=/config/finalize.sh

      # keep your existing vars
      - JIBRI_XMPP_USER
      - JIBRI_XMPP_PASSWORD
      - JIBRI_RECORDER_USER
      - JIBRI_RECORDER_PASSWORD
      - JIBRI_RECORDING_DIR
      - JIBRI_RECORDING_RESOLUTION

      - JIBRI_BREWERY_MUC
      - XMPP_AUTH_DOMAIN
      - XMPP_DOMAIN
      - XMPP_INTERNAL_MUC_DOMAIN
      - XMPP_MUC_DOMAIN
      - XMPP_HIDDEN_DOMAIN
      - XMPP_SERVER

      - PUBLIC_URL
      - TZ

    depends_on:
      - jicofo

    networks:
      meet.jitsi:
